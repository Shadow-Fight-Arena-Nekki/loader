<!DOCTYPE html>
<html lang="en">
<head>
    <title>RHODESHACKS | DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h1>Dashboard</h1>
        <p>Logged in as VIP Member</p>
        
        <div class="hwid-section">
            <span style="font-size: 0.8rem; color: #ff4b2b;">ACTIVE DEVICE ID</span>
            <div class="hwid-box" id="hwidDisplay" onclick="revealAndCopy()">
                <span id="hwidValue">LOADING...</span>
            </div>
            <p style="font-size: 0.75rem;">Click to reveal and copy to clipboard.</p>
        </div>

        <div style="border-top: 1px solid #333; margin: 25px 0; padding-top: 25px;">
            <p>Register New HWID Slot</p>
            <input type="text" id="newHwid" placeholder="PASTE NEW HWID">
            <button onclick="syncHwid()">Sync Device</button>
        </div>

        <a href="#" class="logout-link" onclick="logout()">Terminate Session</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
