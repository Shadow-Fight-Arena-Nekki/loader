<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RHODESHACKS | COMMAND CENTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video autoplay loop muted playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="container" style="max-width: 650px;">
        <h1>Command Center</h1>
        <p class="subtitle">VIP MEMBER SESSION ACTIVE</p>
        
        <div class="hwid-section">
            <span class="section-label">Active Terminal ID</span>
            <div class="hwid-box" id="hwidDisplay" onclick="revealAndCopy()">
                <span id="hwidValue">LOADING...</span>
            </div>
            <p style="font-size: 0.7rem; color: #666; letter-spacing: 1px;">Click terminal block to unblur & copy to clipboard.</p>
        </div>

        <div class="sync-area">
            <p class="subtitle" style="margin-bottom: 20px;">Register New Terminal Slot</p>
            <input type="text" id="newHwid" placeholder="PASTE NEW TERMINAL ID" autocomplete="off">
            <button class="btn-sync" onclick="syncHwid()">Sync Device</button>
        </div>

        <a href="#" class="logout-link" onclick="logout()">Terminate Session</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
